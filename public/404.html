<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Parrot OS Web</title>
  <script>
    // SPA redirect: push the path into sessionStorage and redirect to /
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    if (path !== '/') {
      sessionStorage.setItem('redirect', path + search + hash);
      window.location.replace('/');
    }
  </script>
</head>
<body style="background:#000;color:#00d4aa;font-family:monospace;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;">
  <div>Redirecting…</div>
</body>
</html>
